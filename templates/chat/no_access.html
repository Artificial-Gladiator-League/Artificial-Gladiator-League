{% extends "base.html" %}
{% load core_tags %}
{% block title %}Chat — Access Denied{% endblock %}

{% block content %}
<div class="animate-fade-in">
  <div class="card text-center py-12 max-w-md mx-auto">
    <p class="text-2xl mb-3">🔒</p>
    <h2 class="text-lg font-bold mb-2">Can't start this chat</h2>
    <p class="text-sm text-gray-400 mb-4">
      You need to be friends with <span class="font-semibold text-gray-200">{% fide_badge friend %} {{ friend.username }}</span> to chat.
    </p>
    <a href="{% url 'chat:inbox' %}" class="btn-brand text-sm py-2 px-6">Back to Messages</a>
  </div>
</div>
{% endblock %}
