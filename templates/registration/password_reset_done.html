{% extends "base.html" %}
{% block title %}Email Sent — Artificial Gladiator{% endblock %}

{% block content %}
<div class="max-w-md mx-auto text-center animate-fade-in py-16">
  <div class="card">
    <div class="text-5xl mb-4">📧</div>
    <h1 class="text-2xl font-bold mb-3">Check your email</h1>
    <p class="text-gray-400 text-sm leading-relaxed mb-6">
      If an account exists with that email address, we've sent a password reset link.<br>
      Check your inbox (and spam folder) for the email.
    </p>
    <a href="{% url 'users:login' %}" class="text-sm text-gray-400 hover:text-brand hover:underline transition">Back to login</a>
  </div>
</div>
{% endblock %}
