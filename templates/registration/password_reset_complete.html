{% extends "base.html" %}
{% block title %}Password Reset Complete — Artificial Gladiator{% endblock %}

{% block content %}
<div class="max-w-md mx-auto text-center animate-fade-in py-16">
  <div class="card">
    <div class="text-5xl mb-4">✅</div>
    <h1 class="text-2xl font-bold mb-3">Password reset complete</h1>
    <p class="text-gray-400 text-sm leading-relaxed mb-6">
      Your password has been set. You can now log in with your new password.
    </p>
    <a href="{% url 'users:login' %}" class="btn-brand inline-block px-8 py-2.5 text-base">Log In</a>
  </div>
</div>
{% endblock %}
