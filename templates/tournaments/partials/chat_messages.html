{% load humanize %}
{% load core_tags %}
{% for msg in messages %}
<div class="flex {% if msg.user == request.user %}justify-end{% else %}justify-start{% endif %} mb-1.5">
  <div class="max-w-[80%] {% if msg.user == request.user %}bg-brand/20 border-brand/30{% else %}bg-surface border-borderDark{% endif %} border rounded-lg px-3 py-1.5">
    <div class="flex items-baseline gap-2">
      <span class="text-xs font-semibold {% if msg.user == request.user %}text-brand{% else %}text-purple-400{% endif %}">{% fide_badge msg.user %} {{ msg.user.username }}</span>
      <span class="text-[10px] text-gray-500">{{ msg.created_at|naturaltime }}</span>
    </div>
    <p class="text-sm text-gray-200 break-words">{{ msg.content }}</p>
  </div>
</div>
{% empty %}
<p class="text-center text-xs text-gray-500 py-4">No messages yet. Be the first to chat!</p>
{% endfor %}
